    <linearGradient id="desert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efc37a"/>
      <stop offset="100%" stop-color="#bf8c46"/>
    </linearGradient>

    <radialGradient id="arcane-aura" cx="55%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8655d4" stop-opacity="0.56"/>
      <stop offset="70%" stop-color="#3a204f" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ffe0a8"/>
    </linearGradient>

    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="panel-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

