      <path d="M18 58H34M52 58H68" stroke="#f59e0b" stroke-opacity="0.09" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M18 18L28 28M68 18L58 28" stroke="#7b5ea7" stroke-opacity="0.12" stroke-width="1.6" stroke-linecap="round"/>
    </pattern>
