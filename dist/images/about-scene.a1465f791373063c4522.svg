<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mesa arcana de RPG com mapa de campanha medieval">
  <defs>
    <linearGradient id="bg-night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f131c"/>
      <stop offset="56%" stop-color="#1b1326"/>
      <stop offset="100%" stop-color="#261336"/>
    </linearGradient>

    <linearGradient id="desk-frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1f14"/>
      <stop offset="100%" stop-color="#161a24"/>
    </linearGradient>

    <linearGradient id="desk-surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c2432"/>
      <stop offset="100%" stop-color="#101722"/>
    </linearGradient>

    <linearGradient id="map-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cab07c"/>
      <stop offset="100%" stop-color="#a08455"/>
    </linearGradient>

    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f93d8"/>
      <stop offset="100%" stop-color="#224f87"/>
    </linearGradient>

    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#54a86a"/>
      <stop offset="100%" stop-color="#2f7045"/>
    </linearGradient>

    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c5d0dc"/>
      <stop offset="100%" stop-color="#667386"/>
